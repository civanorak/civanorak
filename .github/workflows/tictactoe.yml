name: tic-tac-toe

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: tictactoe
  cancel-in-progress: false

jobs:
  move:
    if: startsWith(github.event.issue.title, 'ttt|')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Apply move
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: python3 scripts/tictactoe.py play

      - name: Commit board
        env:
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: |
          git config user.name "ttt-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md game/state.json
          if ! git diff --cached --quiet; then
            git commit -m "ttt: move by @${ISSUE_USER}"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Reply and close issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file comment.txt
          gh issue close "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --reason completed
