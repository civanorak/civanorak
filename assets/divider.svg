<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="22" viewBox="0 0 1200 22" role="img" aria-label="divider">
  <defs>
    <linearGradient id="pulseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0"/>
      <stop offset="70%" stop-color="#00D9FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#eaffff" stop-opacity="1"/>
    </linearGradient>
    <filter id="dGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- base line -->
  <line x1="14" y1="11" x2="1186" y2="11" stroke="#123641" stroke-width="2"/>

  <!-- end caps -->
  <path d="M6 11 L14 6 L14 16 Z" fill="#00D9FF" opacity="0.8"/>
  <path d="M1194 11 L1186 6 L1186 16 Z" fill="#00D9FF" opacity="0.8"/>

  <!-- traveling pulse -->
  <g filter="url(#dGlow)">
    <rect x="-150" y="9.5" width="140" height="3" rx="1.5" fill="url(#pulseGrad)"/>
    <circle cx="-10" cy="11" r="3.5" fill="#eaffff"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="1360 0" dur="3.6s" repeatCount="indefinite"/>
  </g>

  <!-- faint return pulse -->
  <g opacity="0.35">
    <rect x="1210" y="10" width="80" height="2" fill="#00D9FF"/>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-1400 0" dur="5.2s" repeatCount="indefinite"/>
  </g>
</svg>
