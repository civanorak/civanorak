<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="240" viewBox="0 0 1000 240" role="img" aria-label="Civan Orak — crystal spider HUD banner">
  <defs>
    <linearGradient id="gemGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9fffa"/>
      <stop offset="40%" stop-color="#6ff2e2"/>
      <stop offset="100%" stop-color="#17b8a6"/>
    </linearGradient>
    <linearGradient id="legGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef7fa"/>
      <stop offset="100%" stop-color="#7e97a3"/>
    </linearGradient>
    <radialGradient id="spiderGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5cf0dd" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#00D9FF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00D9FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="underline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- panel -->
  <rect x="1" y="1" width="998" height="238" rx="14" fill="#0D1117" stroke="#12303d" stroke-width="2"/>

  <!-- faint grid -->
  <g stroke="#00D9FF" stroke-width="1" opacity="0.05">
    <path d="M0 60 H1000 M0 120 H1000 M0 180 H1000"/>
    <path d="M125 0 V240 M250 0 V240 M375 0 V240 M500 0 V240 M625 0 V240 M750 0 V240 M875 0 V240"/>
  </g>

  <!-- HUD corner brackets -->
  <g stroke="#00D9FF" stroke-width="2" fill="none" opacity="0.75">
    <path d="M22 44 V22 H44"/>
    <path d="M956 22 H978 V44"/>
    <path d="M978 196 V218 H956"/>
    <path d="M44 218 H22 V196"/>
  </g>

  <!-- scanning sweep -->
  <rect x="-120" y="2" width="120" height="236" fill="url(#sweepGrad)">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="1240 0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- ══ CRYSTAL SPIDER ══ -->
  <g transform="translate(140 118)">

    <!-- faint web backdrop -->
    <g stroke="#00D9FF" fill="none" opacity="0.10">
      <path d="M0 0 L0 -104 M0 0 L74 -74 M0 0 L104 0 M0 0 L74 74 M0 0 L0 104 M0 0 L-74 74 M0 0 L-104 0 M0 0 L-74 -74"/>
      <path d="M0 -46 Q23 -39 33 -33 Q39 -23 46 0 Q39 23 33 33 Q23 39 0 46 Q-23 39 -33 33 Q-39 23 -46 0 Q-39 -23 -33 -33 Q-23 -39 0 -46 Z"/>
      <path d="M0 -76 Q38 -65 54 -54 Q65 -38 76 0 Q65 38 54 54 Q38 65 0 76 Q-38 65 -54 54 Q-65 38 -76 0 Q-65 -38 -54 -54 Q-38 -65 0 -76 Z"/>
    </g>

    <!-- spider (gentle bob on its silk thread) -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 5; 0 0" dur="5s" repeatCount="indefinite"/>

      <!-- silk thread -->
      <line x1="0" y1="-150" x2="0" y2="-44" stroke="#bfeff5" stroke-width="1" opacity="0.4"/>

      <!-- glow -->
      <ellipse cx="0" cy="16" rx="46" ry="56" fill="url(#spiderGlow)" filter="url(#glow)">
        <animate attributeName="opacity" values="0.5;0.9;0.5" dur="3.5s" repeatCount="indefinite"/>
      </ellipse>

      <!-- legs -->
      <g stroke="url(#legGrad)" stroke-width="4" stroke-linecap="round" fill="none">
        <path d="M10 -18 L38 -48 L58 -90"/>
        <path d="M12 -12 L50 -28 L82 -54"/>
        <path d="M12 -4 L52 0 L86 -10"/>
        <path d="M10 6 L44 28 L64 62"/>
        <path d="M-10 -18 L-38 -48 L-58 -90"/>
        <path d="M-12 -12 L-50 -28 L-82 -54"/>
        <path d="M-12 -4 L-52 0 L-86 -10"/>
        <path d="M-10 6 L-44 28 L-64 62"/>
      </g>
      <!-- crystal leg joints -->
      <g fill="#eafcff">
        <circle cx="38" cy="-48" r="2.4"/><circle cx="50" cy="-28" r="2.4"/><circle cx="52" cy="0" r="2.4"/><circle cx="44" cy="28" r="2.4"/>
        <circle cx="-38" cy="-48" r="2.4"/><circle cx="-50" cy="-28" r="2.4"/><circle cx="-52" cy="0" r="2.4"/><circle cx="-44" cy="28" r="2.4"/>
      </g>

      <!-- fangs -->
      <g stroke="url(#legGrad)" stroke-width="3" stroke-linecap="round">
        <path d="M-5 -32 L-9 -44"/>
        <path d="M5 -32 L9 -44"/>
      </g>

      <!-- head gem -->
      <polygon points="0,-36 13,-20 0,-4 -13,-20" fill="url(#gemGrad)" stroke="#eafffb" stroke-width="1" stroke-opacity="0.8"/>
      <path d="M0 -36 L0 -4 M-13 -20 L13 -20" stroke="#ffffff" stroke-width="0.8" opacity="0.45"/>

      <!-- abdomen gem (marquise cut) -->
      <path d="M0 -2 C 22 4 27 34 0 62 C -27 34 -22 4 0 -2 Z" fill="url(#gemGrad)" stroke="#eafffb" stroke-width="1.2" stroke-opacity="0.85"/>
      <!-- facets -->
      <g stroke="#ffffff" stroke-width="0.9" opacity="0.5" fill="none">
        <path d="M0 -2 L-13 22 L0 62 M0 -2 L13 22 L0 62 M-13 22 L13 22 M0 -2 L0 62"/>
      </g>
      <!-- gem sparkle -->
      <ellipse cx="-6" cy="14" rx="4" ry="7" fill="#ffffff" opacity="0.5" transform="rotate(-20 -6 14)">
        <animate attributeName="opacity" values="0.25;0.75;0.25" dur="3.5s" repeatCount="indefinite"/>
      </ellipse>
    </g>
  </g>

  <!-- ══ TEXT BLOCK ══ -->
  <g font-family="Consolas, 'Courier New', monospace">
    <text x="280" y="104" font-size="46" font-weight="bold" fill="#e8f6ff" letter-spacing="6">
      CIVAN ORAK
      <animate attributeName="opacity" values="1;0.88;1;1;0.93;1" dur="4s" repeatCount="indefinite"/>
    </text>
    <rect x="282" y="120" width="330" height="3" fill="url(#underline)"/>

    <text x="282" y="152" font-size="17" fill="#00D9FF" letter-spacing="4">
      "STARK" // SOFTWARE ENGINEER
    </text>

    <text x="282" y="192" font-size="14" fill="#5fd9ef" letter-spacing="2" opacity="0.9">
      WEB SERVER: ONLINE
      <animate attributeName="opacity" values="0.9;0.55;0.9" dur="2.2s" repeatCount="indefinite"/>
    </text>
    <rect x="478" y="180" width="9" height="14" fill="#00D9FF">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ══ EQ BARS ══ -->
  <g fill="#00D9FF" opacity="0.85">
    <rect x="856" y="150" width="9" height="42">
      <animate attributeName="height" values="42;16;54;28;42" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="150;176;138;164;150" dur="2.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="872" y="164" width="9" height="28">
      <animate attributeName="height" values="28;52;20;44;28" dur="1.7s" repeatCount="indefinite"/>
      <animate attributeName="y" values="164;140;172;148;164" dur="1.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="888" y="156" width="9" height="36">
      <animate attributeName="height" values="36;22;56;14;36" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="156;170;136;178;156" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="904" y="170" width="9" height="22">
      <animate attributeName="height" values="22;46;30;52;22" dur="1.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="170;146;162;140;170" dur="1.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="920" y="158" width="9" height="34">
      <animate attributeName="height" values="34;58;18;40;34" dur="2.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="158;134;174;152;158" dur="2.3s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="978" y="228" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#3b6f80" text-anchor="end" letter-spacing="2">STARK INDUSTRIES // PROFILE v2.1</text>
</svg>
